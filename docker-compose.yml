services:
  postgres:
    image: postgres:16-alpine
    container_name: dormitory_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dormitory
      POSTGRES_USER: dormitory
      POSTGRES_PASSWORD: secret
    ports:
      - "8888:5432"
    volumes:
      - dormitory_pg_data:/var/lib/postgresql/data

volumes:
  dormitory_pg_data:
    driver: local
