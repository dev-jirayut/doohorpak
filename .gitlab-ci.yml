stages:
  - deploy

.base_deploy:
  image: alpine:latest
  stage: deploy
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

deploy:production:
  extends: .base_deploy
  only:
    - main
  script:
    - |
      ssh $SSH_USER@$SSH_HOST '
        set -e
        cd /home/ploi/doohorpak.online

        git pull origin main

        composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

        npm ci
        npm run build
        rm -f public/hot

        php artisan optimize:clear
        MIGRATE_OUTPUT=$(php artisan migrate --force 2>&1) || MIGRATE_FAILED=1
        echo "$MIGRATE_OUTPUT"
        if [ "${MIGRATE_FAILED:-0}" = "1" ]; then
          if echo "$MIGRATE_OUTPUT" | grep -qi "already exists"; then
            echo "Migration skipped: database tables already exist."
          else
            exit 1
          fi
        fi
        php artisan config:cache
        php artisan route:cache
        php artisan view:cache

        echo "" | sudo -S service php8.3-fpm reload

        echo "Application deployed!"
      '
  environment:
    name: production
    url: https://doohorpak.online

deploy:dev:
  extends: .base_deploy
  only:
    - dev
  script:
    - |
      ssh $SSH_USER@$SSH_HOST '
        set -e
        cd /home/ploi/doohorpak.online

        git pull origin dev

        composer install --no-interaction --prefer-dist --optimize-autoloader

        npm ci
        npm run build
        rm -f public/hot

        php artisan optimize:clear
        MIGRATE_OUTPUT=$(php artisan migrate --force 2>&1) || MIGRATE_FAILED=1
        echo "$MIGRATE_OUTPUT"
        if [ "${MIGRATE_FAILED:-0}" = "1" ]; then
          if echo "$MIGRATE_OUTPUT" | grep -qi "already exists"; then
            echo "Migration skipped: database tables already exist."
          else
            exit 1
          fi
        fi

        echo "" | sudo -S service php8.3-fpm reload

        echo "Development deployed!"
      '
  environment:
    name: development
    url: https://doohorpak.online
